<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SettleX Access</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Toggle Link Styling */
    .toggle-link {
      color: #0fc;
      cursor: pointer;
      margin-top: 15px;
      display: inline-block;
      font-size: 14px;
    }

    .toggle-link:hover {
      text-decoration: underline;
    }

    #register-container {
      display: none;
    }

    /* NEW: Show Password Checkbox Styling */
    .show-password-container {
      text-align: left;
      width: 90%;
      margin: 0 auto 15px auto;
      font-size: 14px;
      color: #aaaaaa;
    }

    .show-password-container input {
      width: auto;
      margin-right: 5px;
      margin-bottom: 0;
    }
  </style>
</head>

<body>
  <h1>SettleX Live Ledger</h1>

  <div style="text-align: right; margin-bottom: 20px;">
    <button id="logout-btn" style="background-color: #f44336; color: white; width: auto;">Secure Logout</button>
  </div>

  <div class="form-container">
    <div class="login-container" id="login-container">
      <h2>SettleX Login</h2>
      <form id="login-form">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>

        <div class="show-password-container">
          <input type="checkbox" id="toggle-login-pass">
          <label for="toggle-login-pass">Show Password</label>
        </div>

        <button type="submit">Access Ledger</button>
      </form>
      <p id="login-error" style="color: #f44336; display: none; margin-top: 15px;">Invalid credentials.</p>
      <span class="toggle-link" id="show-register">Need an account? Sign Up</span>
    </div>

    <div class="login-container" id="register-container">
      <h2>Create Account</h2>
      <form id="register-form">
        <input type="text" id="reg-username" placeholder="Choose a Username" required>
        <input type="password" id="reg-password" placeholder="Choose a Password" required>

        <div class="show-password-container">
          <input type="checkbox" id="toggle-reg-pass">
          <label for="toggle-reg-pass">Show Password</label>
        </div>

        <button type="submit">Register</button>
      </form>
      <p id="reg-message" style="margin-top: 15px; font-weight: bold;"></p>
      <span class="toggle-link" id="show-login">Already have an account? Log In</span>
    </div>

    <script src="app.js"></script>
</body>

</html>
